<!DOCTYPE html>
<html>
<head>
    <title>Instant Direct AUX Receiver</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #111; color: #fff; padding-top: 40px; }
        .display-container { margin-top: 30px; }
        #sub-count {
            font-size: 110px; font-weight: bold; color: #00ff66; 
            background: #1c1c1c; display: inline-block; padding: 20px 60px;
            border-radius: 20px; border: 4px solid #00ff66;
            text-shadow: 0 0 25px rgba(0, 255, 102, 0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #channel-name { font-size: 45px; font-weight: bold; margin-top: 25px; color: #ffffff; }
        #channel-handle { font-size: 28px; color: #00bcd4; font-style: italic; margin-top: 5px; }
        #status { font-size: 16px; color: #666; margin-top: 40px; }
        #listenBtn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ff66; border: none; border-radius: 8px; font-weight: bold; color: #111; }
    </style>
</head>
<body>
    <h1>⚡ Real-Time Direct Monitor ⚡</h1>
    <button id="listenBtn">👂 START DIRECT MONITOR 👂</button>

    <div class="display-container">
        <div id="sub-count">000</div>
        <div id="channel-name">Listening to AUX port...</div>
        <div id="channel-handle">@waiting</div>
    </div>
    <div id="status">Status: Idle.</div>

    <script>
        let isListening = false;
        let receivedBuffer = "";
        let lastToneTime = 0;

        const BASE_FREQ = 1000;
        const STEP_FREQ = 40;

        document.getElementById('listenBtn').addEventListener('click', async () => {
            if (isListening) return;
            isListening = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                const source = audioCtx.createMediaStreamSource(stream);
                
                // Set up a frequency analyzer loop to find pitch spikes in real-time
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                document.getElementById('status').innerText = "Status: Monitoring audio vectors natively...";
                document.getElementById('listenBtn').style.display = 'none';

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                const sampleRate = audioCtx.sampleRate;

                function detectTones() {
                    analyser.getByteFrequencyData(dataArray);
                    
                    let maxVal = 0;
                    let maxIndex = -1;

                    for (let i = 0; i < bufferLength; i++) {
                        if (dataArray[i] > maxVal) {
                            maxVal = dataArray[i];
                            maxIndex = i;
                        }
                    }

                    // Look for a dominant pitch wave spike coming down the copper wire
                    if (maxVal > 150) { 
                        let currentFreq = maxIndex * (sampleRate / analyser.fftSize);
                        let now = Date.now();

                        // Debounce threshold loop to avoid duplicating letters
                        if (now - lastToneTime > 45) {
                            let approximateCode = Math.round((currentFreq - BASE_FREQ) / STEP_FREQ);
                            
                            if (approximateCode >= 32 && approximateCode <= 126) {
                                let char = String.fromCharCode(approximateCode);
                                receivedBuffer += char;
                                lastToneTime = now;
                            }
                        }
                    } else {
                        // If silence returns for 400ms, process the full string block
                        if (receivedBuffer.length > 0 && Date.now() - lastToneTime > 400) {
                            let pieces = receivedBuffer.split('|');
                            if (pieces.length === 3) {
                                document.getElementById('sub-count').innerText = Number(pieces[0]).toLocaleString();
                                document.getElementById('channel-name').innerText = pieces[1];
                                document.getElementById('channel-handle').innerText = pieces[2];
                                document.getElementById('status').innerText = "Data updated natively.";
                            }
                            receivedBuffer = "";
                        }
                    }
                    requestAnimationFrame(detectTones);
                }
                detectTones();

            } catch (err) {
                document.getElementById('status').innerText = "Error: Input interface failed.";
            }
        });
    </script>
</body>
</html>
