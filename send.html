<!DOCTYPE html>
<html>
<head>
    <title>Instant AUX Receiver</title>
    <script src="https://cloudflare.com" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #111; color: #fff; padding-top: 40px; }
        .display-container { margin-top: 30px; }
        #sub-count {
            font-size: 110px; font-weight: bold; color: #00ff66; 
            background: #1c1c1c; display: inline-block; padding: 20px 60px;
            border-radius: 20px; border: 4px solid #00ff66;
            text-shadow: 0 0 25px rgba(0, 255, 102, 0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #channel-name { font-size: 45px; font-weight: bold; margin-top: 25px; color: #ffffff; }
        #channel-handle { font-size: 28px; color: #00bcd4; font-style: italic; margin-top: 5px; }
        #status { font-size: 16px; color: #666; margin-top: 40px; }
        #listenBtn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ff66; border: none; border-radius: 8px; font-weight: bold; color: #111; }
    </style>
</head>
<body>
    <h1>⚡ Real-Time Instant Monitor ⚡</h1>
    <button id="listenBtn">👂 START INSTANT MONITOR 👂</button>

    <div class="display-container">
        <div id="sub-count">000</div>
        <div id="channel-name">Waiting for burst...</div>
        <div id="channel-handle">@offline</div>
    </div>
    <div id="status">Status: Click button to unlock mic.</div>

    <script>
        let ggwaveCtx = null;
        let isListening = false;

        document.getElementById('listenBtn').addEventListener('click', async () => {
            if (isListening) return;
            isListening = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                ggwaveCtx = new AudioContext({ sampleRate: 48000 });
                const source = ggwaveCtx.createMediaStreamSource(stream);
                source.connect(ggwaveCtx.destination);

                // Lowered blocksize from 1024 to 256 for instant hardware processing
                const processor = ggwaveCtx.createScriptProcessor(256, 1, 1);
                source.connect(processor);
                processor.connect(ggwaveCtx.destination);

                document.getElementById('status').innerText = "Status: Monitoring live audio stream...";
                document.getElementById('listenBtn').style.display = 'none';

                processor.onaudioprocess = function(e) {
                    let inputData = e.inputBuffer.getChannelData(0);
                    let engine = window.ggwave || window.Ggwave;
                    let res = engine.decode(inputData);
                    
                    if (res) {
                        let decodedString = new TextDecoder().decode(res);
                        let pieces = decodedString.split('|');
                        if (pieces.length === 3) {
                            document.getElementById('sub-count').innerText = Number(pieces[0]).toLocaleString();
                            document.getElementById('channel-name').innerText = pieces[1];
                            document.getElementById('channel-handle').innerText = pieces[2];
                            document.getElementById('status').innerText = "Burst decoded instantly.";
                        }
                    }
                };
            } catch (err) {
                document.getElementById('status').innerText = "Error: Input mapping failed.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
