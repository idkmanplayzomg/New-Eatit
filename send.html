<!DOCTYPE html>
<html>
<head>
    <title>Instant Direct AUX Receiver</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #111; color: #fff; padding-top: 40px; }
        .display-container { margin-top: 30px; }
        #sub-count {
            font-size: 110px; font-weight: bold; color: #00ff66; 
            background: #1c1c1c; display: inline-block; padding: 20px 60px;
            border-radius: 20px; border: 4px solid #00ff66;
            text-shadow: 0 0 25px rgba(0, 255, 102, 0.4); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #channel-name { font-size: 45px; font-weight: bold; margin-top: 25px; color: #ffffff; }
        #channel-handle { font-size: 28px; color: #00bcd4; font-style: italic; margin-top: 5px; }
        #status { font-size: 16px; color: #666; margin-top: 40px; }
        #listenBtn { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00ff66; border: none; border-radius: 8px; font-weight: bold; color: #111; }
    </style>
</head>
<body>
    <h1>⚡ Real-Time Direct Monitor ⚡</h1>
    <button id="listenBtn">👂 START DIRECT MONITOR 👂</button>

    <div class="display-container">
        <div id="sub-count">000</div>
        <div id="channel-name">Listening to AUX port...</div>
        <div id="channel-handle">@waiting</div>
    </div>
    <div id="status">Status: Idle.</div>

    <script>
        let isListening = false;
        let receivedBuffer = "";
        let lastToneTime = 0;
        let lastCharCode = -1;

        const BASE_FREQ = 1200;
        const STEP_FREQ = 25;

        document.getElementById('listenBtn').addEventListener('click', async () => {
            if (isListening) return;
            isListening = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048; 
                source.connect(analyser);

                document.getElementById('status').innerText = "Status: Processing frequencies natively...";
                document.getElementById('listenBtn').style.display = 'none';

                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                const sampleRate = audioCtx.sampleRate;

                function processAudio() {
                    analyser.getByteFrequencyData(dataArray);
                    let maxVal = 0;
                    let maxIndex = -1;

                    for (let i = 0; i < bufferLength; i++) {
                        if (dataArray[i] > maxVal) {
                            maxVal = dataArray[i];
                            maxIndex = i;
                        }
                    }

                    // Sound wave detection threshold
                    if (maxVal > 140) { 
                        let currentFreq = maxIndex * (sampleRate / analyser.fftSize);
                        let calculatedCode = Math.round((currentFreq - BASE_FREQ) / STEP_FREQ);
                        let now = Date.now();

                        // Debounce threshold validation loop
                        if (calculatedCode >= 32 && calculatedCode <= 126) {
                            if (now - lastToneTime > 35 || calculatedCode !== lastCharCode) {
                                let char = String.fromCharCode(calculatedCode);
                                
                                if (char === '~') { // End-of-packet token caught
                                    let pieces = receivedBuffer.split('|');
                                    if (pieces.length === 3) {
                                        document.getElementById('sub-count').innerText = Number(pieces[0]).toLocaleString();
                                        document.getElementById('channel-name').innerText = pieces[1];
                                        document.getElementById('channel-handle').innerText = pieces[2];
                                        document.getElementById('status').innerText = "Data matrix parsed instantly!";
                                    }
                                    receivedBuffer = "";
                                } else {
                                    receivedBuffer += char;
                                }
                                lastToneTime = now;
                                lastCharCode = calculatedCode;
                            }
                        }
                    }
                    requestAnimationFrame(processAudio);
                }
                processAudio();

            } catch (err) {
                document.getElementById('status').innerText = "Error: Soundcard mapping failed.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
