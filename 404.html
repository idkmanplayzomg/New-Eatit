<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting Challenge...</title>
    <script>
        // Check if the request is trying to hit your ACME path
        var currentPath = window.location.pathname;
        if (currentPath.includes('/.well-known/acme-challenge/')) {
            // Extract the unique token from the very end of your URL path
            var token = currentPath.substring(currentPath.lastIndexOf('/') + 1);
            
            // Build the exact destination CertKit is demanding
            var certkitTarget = "https://app.certkit.io/http-challenge/free/bbdf90d10cf642c6b2a86a2f6a0f9348/" + token;
            
            // Instantly execute an immediate browser-level forward
            window.location.replace(certkitTarget);
        }
    </script>
</head>
<body>
    <p>Redirecting to security verification token...</p>
</body>
</html>
